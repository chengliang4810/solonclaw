name: Publish Packages Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check project naming self-test
        shell: pwsh
        run: ./scripts/check-project-naming.selftest.ps1

      - name: Check project naming
        shell: pwsh
        run: ./scripts/check-project-naming.ps1

      - name: Check raw exception logging self-test
        shell: pwsh
        run: ./scripts/check-raw-exception-logging.selftest.ps1

      - name: Check raw exception logging
        shell: pwsh
        run: ./scripts/check-raw-exception-logging.ps1

      - name: Check new commit naming
        shell: pwsh
        run: ./scripts/check-project-naming.ps1 -CheckGitCommitSubjects -CheckGitObjectText -GitCommitRange "${{ github.sha }}^..${{ github.sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/chengliang4810/jimuqu-agent
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
