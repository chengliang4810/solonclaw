name: Publish Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v2026.04.29-dc1c633"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check project naming self-test
        shell: pwsh
        run: ./scripts/check-project-naming.selftest.ps1

      - name: Check project naming
        shell: pwsh
        run: ./scripts/check-project-naming.ps1

      - name: Check raw exception logging self-test
        shell: pwsh
        run: ./scripts/check-raw-exception-logging.selftest.ps1

      - name: Check raw exception logging
        shell: pwsh
        run: ./scripts/check-raw-exception-logging.ps1

      - name: Check new commit naming
        shell: pwsh
        run: ./scripts/check-project-naming.ps1 -CheckGitCommitSubjects -CheckGitObjectText -GitCommitRange "${{ github.sha }}^..${{ github.sha }}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="$INPUT_TAG_NAME"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            RELEASE_TAG="${{ github.ref_name }}"
          else
            RELEASE_DATE="$(TZ=Asia/Shanghai date +%Y.%m.%d)"
            SHORT_SHA="${GITHUB_SHA::7}"
            RELEASE_TAG="v${RELEASE_DATE}-${SHORT_SHA}"
          fi

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9A-Za-z]{7,}$ ]]; then
            echo "Release tag must look like v2026.04.29-dc1c633, got: $RELEASE_TAG"
            exit 1
          fi

          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve release commit range
        id: release_range
        shell: pwsh
        run: ./scripts/resolve-release-range.ps1

      - name: Check release commit text
        shell: pwsh
        run: ./scripts/check-project-naming.ps1 -CheckGitCommitSubjects -CheckGitObjectText -GitCommitRange "${{ steps.release_range.outputs.git_range }}"

      - name: Create tag for main push
        if: github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == 'main'
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.release.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            TAG_COMMIT="$(git rev-list -n 1 "$RELEASE_TAG")"
            if [ "$TAG_COMMIT" != "$GITHUB_SHA" ]; then
              echo "Tag $RELEASE_TAG already exists on $TAG_COMMIT, current commit is $GITHUB_SHA"
              exit 1
            fi
            echo "Tag $RELEASE_TAG already exists on this commit"
          else
            git tag -a "$RELEASE_TAG" "$GITHUB_SHA" -m "Release $RELEASE_TAG"
            git push origin "refs/tags/$RELEASE_TAG"
          fi

      - name: Build release artifact
        run: mvn -B -DskipTests package

      - name: Prepare release files
        id: artifact
        shell: bash
        env:
          RELEASE_GIT_RANGE: ${{ steps.release_range.outputs.git_range }}
          RELEASE_DISPLAY_RANGE: ${{ steps.release_range.outputs.display_range }}
        run: |
          VERSION="$(mvn -B -q -DforceStdout help:evaluate "-Dexpression=project.version")"
          JAR_PATH="$(find target -maxdepth 1 -type f -name "${{ github.event.repository.name }}-${VERSION}.jar" ! -name 'original-*' -print -quit)"
          if [ -z "$JAR_PATH" ]; then
            JAR_PATH="$(find target -maxdepth 1 -type f -name "${{ github.event.repository.name }}-*.jar" ! -name 'original-*' -print -quit)"
          fi
          if [ -z "$JAR_PATH" ]; then
            JAR_PATH="$(find target -maxdepth 1 -type f -name "*.jar" ! -name 'original-*' -print -quit)"
          fi
          if [ -z "$JAR_PATH" ] || [ ! -f "$JAR_PATH" ]; then
            echo "Release jar not found"
            find target -maxdepth 1 -type f -print
            exit 1
          fi

          mkdir -p dist
          RELEASE_JAR="dist/${{ github.event.repository.name }}-${VERSION}.jar"
          cp "$JAR_PATH" "$RELEASE_JAR"
          (cd dist && sha256sum "$(basename "$RELEASE_JAR")" > SHA256SUMS)

          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/write-release-notes.ps1 \
            -OutputPath dist/release-notes.md \
            -Tag "${{ steps.release.outputs.tag }}" \
            -Version "$VERSION" \
            -CommitRange "$RELEASE_GIT_RANGE" \
            -DisplayRange "$RELEASE_DISPLAY_RANGE"

          echo "jar_path=$RELEASE_JAR" >> "$GITHUB_OUTPUT"
          echo "sha_path=dist/SHA256SUMS" >> "$GITHUB_OUTPUT"
          echo "body_path=dist/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Check release naming
        shell: pwsh
        run: |
          ./scripts/check-project-naming.ps1 -RootPath dist -CheckBinaryText
          ./scripts/check-archive-naming.ps1 -ArchivePath "${{ steps.artifact.outputs.jar_path }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jimuqu-agent-release
          path: |
            ${{ steps.artifact.outputs.jar_path }}
            ${{ steps.artifact.outputs.sha_path }}
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: jimuqu-agent ${{ steps.release.outputs.tag }}
          body_path: ${{ steps.artifact.outputs.body_path }}
          generate_release_notes: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifact.outputs.jar_path }}
            ${{ steps.artifact.outputs.sha_path }}

      - name: Check published release naming
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/check-release-naming.ps1 -Tag "${{ steps.release.outputs.tag }}"
