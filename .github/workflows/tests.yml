name: Test Suites

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  # 后端测试独立运行，避免前端构建掩盖 Java 行为回归。
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test backend
        run: mvn -B -Dskip.web.build=true test

      - name: Check Java formatting
        run: mvn -B -Dskip.web.build=true spotless:check

  # Dashboard 使用 package.json 中的统一测试入口，自动覆盖全部 test:* 脚本。
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Dashboard dependencies
        working-directory: web
        run: npm ci

      - name: Test Dashboard
        working-directory: web
        run: npm test

      - name: Build Dashboard
        working-directory: web
        run: npm run build

  # Terminal UI 同时执行 lint、类型检查和行为测试。
  terminal-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: terminal-ui/package-lock.json

      - name: Install Terminal UI dependencies
        working-directory: terminal-ui
        run: npm ci

      - name: Lint Terminal UI
        working-directory: terminal-ui
        run: npm run lint

      - name: Check Terminal UI types
        working-directory: terminal-ui
        run: npm run type-check

      - name: Test Terminal UI
        working-directory: terminal-ui
        run: npm test
