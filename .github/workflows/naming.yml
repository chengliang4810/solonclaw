name: Repository Guards

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check repository guards
        shell: bash
        run: |
          python3 scripts/check-project-naming.selftest.py
          python3 scripts/check-project-naming.py
          python3 scripts/check-github-package-name.py
          python3 scripts/check-raw-exception-logging.selftest.py
          python3 scripts/check-raw-exception-logging.py

      - name: Check new commit text
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            range="${BASE_SHA}..${HEAD_SHA}"
          elif [ -z "$BEFORE_SHA" ] || [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            range="$HEAD_SHA"
          else
            range="${BEFORE_SHA}..${HEAD_SHA}"
          fi

          python3 scripts/check-project-naming.py --check-git-commit-subjects --check-git-object-text --git-commit-range "$range"
