name: Repository Guards

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check repository guards
        shell: pwsh
        run: |
          ./scripts/check-project-naming.selftest.ps1
          ./scripts/check-project-naming.ps1
          ./scripts/check-raw-exception-logging.selftest.ps1
          ./scripts/check-raw-exception-logging.ps1

      - name: Check new commit text
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if ($env:EVENT_NAME -eq "pull_request") {
            $range = "$($env:BASE_SHA)..$($env:HEAD_SHA)"
          } elseif ([string]::IsNullOrWhiteSpace($env:BEFORE_SHA) -or $env:BEFORE_SHA -match '^0+$') {
            $range = $env:HEAD_SHA
          } else {
            $range = "$($env:BEFORE_SHA)..$($env:HEAD_SHA)"
          }

          ./scripts/check-project-naming.ps1 -CheckGitCommitSubjects -CheckGitObjectText -GitCommitRange $range
