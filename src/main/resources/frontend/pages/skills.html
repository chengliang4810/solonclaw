<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolonClaw - 技能管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        .card-hover { transition: all 0.2s ease-in-out; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15); }
        *:focus-visible { outline: 2px solid #3B82F6; outline-offset: 2px; }
    </style>
</head>
<body class="bg-gray-100 h-full overflow-y-auto custom-scroll p-4">
    <div class="bg-white rounded-xl shadow-md">
        <div class="border-b flex items-center justify-between px-4 py-3">
            <h2 class="text-lg font-semibold text-gray-800">技能管理</h2>
            <button onclick="openAddSkillModal()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm flex items-center space-x-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                <span>添加技能</span>
            </button>
        </div>
        <div id="skillsContent" class="p-4">
            <div class="flex items-center justify-center h-32 text-gray-400">
                <span>加载中...</span>
            </div>
        </div>
    </div>

    <!-- 添加技能模态框 -->
    <div id="addSkillModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">添加技能</h3>
            <form id="addSkillForm" onsubmit="addSkill(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">技能名称</label>
                    <input type="text" id="skillName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">技能描述</label>
                    <textarea id="skillDescription" rows="3" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="flex space-x-3">
                    <button type="button" onclick="closeAddSkillModal()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg">取消</button>
                    <button type="submit" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">添加</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../RequestUtil.js?v=1.0"></script>
    <script src="skills.js?v=1.0"></script>
</body>
</html>
