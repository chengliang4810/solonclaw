<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolonClaw - 对话</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义滚动条样式 */
        .chat-container::-webkit-scrollbar,
        .session-list::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track,
        .session-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        .chat-container::-webkit-scrollbar-thumb,
        .session-list::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        .chat-container::-webkit-scrollbar-thumb:hover,
        .session-list::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }

        /* 打字动画光标 */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 消息淡入动画 */
        .message-fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown 内容淡入动画 */
        .markdown-typewriter {
            animation: markdownFadeIn 0.5s ease-in;
        }
        @keyframes markdownFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Markdown 内容样式 */
        .markdown-content pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .markdown-content code {
            background: #f3f4f6;
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
        }
        .markdown-content pre code {
            background: transparent;
            padding: 0;
        }

        /* 列表样式 - 显示小点 */
        .markdown-content ul {
            list-style: disc;
            margin-left: 1.5rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .markdown-content ol {
            list-style: decimal;
            margin-left: 1.5rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .markdown-content li {
            margin: 0.25rem 0;
        }

        /* 表格样式 - 添加边框 */
        .markdown-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.75rem 0;
            border: 1px solid #e5e7eb;
        }
        .markdown-content th,
        .markdown-content td {
            border: 1px solid #e5e7eb;
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        .markdown-content th {
            background: #f9fafb;
            font-weight: 600;
        }
        .markdown-content tr:hover {
            background: #f9fafb;
        }

        .markdown-content p {
            margin: 0.5rem 0;
        }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            font-weight: 600;
            margin: 1rem 0 0.5rem;
        }
        .markdown-content blockquote {
            border-left: 4px solid #e5e7eb;
            padding-left: 1rem;
            margin: 0.5rem 0;
            color: #6b7280;
        }

        /* 会话列表项样式 */
        .session-item {
            transition: all 0.2s ease-in-out;
        }
        .session-item:hover {
            background: #f3f4f6;
        }
        .session-item.active {
            background: #eff6ff;
            border-left: 3px solid #3b82f6;
        }

        /* 增强焦点可见性 */
        *:focus-visible {
            outline: 2px solid #3B82F6;
            outline-offset: 2px;
        }
        button:focus-visible {
            outline-offset: 4px;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden p-4">
    <div class="flex h-full bg-white rounded-xl shadow-md overflow-hidden">
        <!-- 左侧历史会话侧边栏 -->
        <div class="w-64 bg-white border-r flex flex-col h-full">
            <!-- 新建会话按钮 -->
            <div class="p-4 border-b">
                <button
                    id="newSessionButton"
                    class="w-full flex items-center justify-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl transition-colors duration-200"
                    aria-label="新建会话"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    <span class="font-medium">新建会话</span>
                </button>
            </div>

            <!-- 历史会话列表 -->
            <div class="flex-1 overflow-y-auto session-list">
                <div class="p-3">
                    <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2 px-2">历史会话</h3>
                    <div id="sessionList" class="space-y-1">
                        <!-- 会话列表项将在这里动态生成 -->
                        <div class="text-center text-gray-400 py-8 text-sm">
                            暂无历史会话
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧对话框 -->
        <div class="flex-1 flex flex-col bg-white h-full overflow-hidden">
            <!-- 聊天消息容器 -->
            <div id="chatContainer" class="chat-container flex-1 overflow-y-auto p-4 space-y-4 min-h-0">
                <!-- 欢迎消息 -->
                <div class="flex justify-start">
                    <div class="bg-gray-100 text-gray-800 rounded-2xl rounded-bl-sm px-4 py-3 max-w-[80%] markdown-content">
                        <div class="font-semibold text-gray-800 mb-2">欢迎使用 SolonClaw 👋</div>
                        <div class="text-gray-600 text-sm">我是您的智能助手，可以帮助您执行各种任务。请在下方输入您的问题或需求。</div>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="border-t bg-gray-50 p-4">
                <div class="flex items-center space-x-3">
                    <div class="flex-1 relative">
                        <textarea
                            id="messageInput"
                            rows="1"
                            class="w-full resize-none rounded-2xl border border-gray-300 px-4 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                            placeholder="输入您的问题..."
                            style="max-height: 120px;"
                            aria-label="输入您的问题或需求"
                        ></textarea>
                        <button
                            id="sendButton"
                            class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white rounded-xl flex items-center justify-center transition-colors duration-200"
                            aria-label="发送消息"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                            </svg>
                        </button>
                    </div>
                    <button
                        id="clearButton"
                        class="w-10 h-10 bg-gray-200 hover:bg-gray-300 text-gray-600 rounded-xl flex items-center justify-center transition-colors duration-200 flex-shrink-0"
                        title="清空对话"
                        aria-label="清空对话"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                    </button>
                </div>
                <div class="mt-2 flex items-center justify-between text-xs text-gray-500">
                    <span>按 Enter 发送，Shift+Enter 换行</span>
                    <span id="charCount">0 / 2000</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 flex items-center space-x-4">
            <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <span class="text-gray-700">处理中...</span>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="hidden fixed top-4 right-4 px-4 py-3 rounded-lg shadow-lg z-50 transition-all duration-300"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../RequestUtil.js?v=1.0"></script>
    <script src="chat.js?v=1.0"></script>
</body>
</html>
