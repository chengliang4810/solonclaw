<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolonClaw - 日志查看</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        *:focus-visible { outline: 2px solid #3B82F6; outline-offset: 2px; }
    </style>
</head>
<body class="bg-gray-100 h-full flex flex-col p-4">
    <!-- 筛选区域 -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">日志级别</label>
                <select id="logLevel" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    <option value="">全部</option>
                    <option value="INFO">INFO</option>
                    <option value="DEBUG">DEBUG</option>
                    <option value="ERROR">ERROR</option>
                    <option value="WARN">WARN</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">来源</label>
                <select id="logSource" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    <option value="">全部</option>
                    <option value="AGENT">Agent</option>
                    <option value="USER">User</option>
                    <option value="SYSTEM">System</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">关键字</label>
                <input type="text" id="logKeyword" class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="搜索关键字">
            </div>
            <div class="flex items-end space-x-2">
                <button onclick="filterLogs()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">筛选</button>
                <button onclick="clearLogs()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">清空</button>
            </div>
        </div>
    </div>

    <!-- 日志列表 -->
    <div class="bg-white rounded-xl shadow-md flex-1 overflow-hidden flex flex-col">
        <div class="border-b px-4 py-3">
            <h2 class="text-lg font-semibold text-gray-800">系统日志</h2>
        </div>
        <div id="logsContent" class="flex-1 overflow-y-auto p-4 custom-scroll">
            <div class="flex items-center justify-center h-32 text-gray-400">
                <span>加载中...</span>
            </div>
        </div>
    </div>

    <script src="../RequestUtil.js?v=1.0"></script>
    <script src="logs.js?v=1.0"></script>
</body>
</html>
