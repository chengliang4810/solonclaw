<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolonClaw AI Agent</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义滚动条样式 */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }

        /* 侧边栏菜单项动画 */
        .menu-item {
            transition: all 0.2s ease-in-out;
        }
        .menu-item:hover {
            transform: translateX(4px);
        }
        .menu-item.active {
            background: linear-gradient(90deg, #3B82F6 0%, #2563EB 100%);
            color: white;
        }

        /* 页面切换动画 */
        .page-content {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 增强焦点可见性 */
        *:focus-visible {
            outline: 2px solid #3B82F6;
            outline-offset: 2px;
        }
        button:focus-visible {
            outline-offset: 4px;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">
    <!-- 顶部导航栏 -->
    <header class="bg-blue-600 text-white shadow-lg z-20">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center space-x-4">
                <button id="menuToggle" class="lg:hidden p-2 hover:bg-white/10 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">SolonClaw</h1>
                        <p class="text-blue-100 text-sm">AI Agent 智能助手</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div id="statusIndicator" class="flex items-center space-x-2 bg-white/10 px-3 py-1.5 rounded-lg">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <span class="text-sm">已连接</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <div class="flex flex-1 overflow-hidden">
        <!-- 侧边栏 -->
        <aside id="sidebar" class="w-64 bg-white shadow-lg flex-shrink-0 flex flex-col overflow-hidden transform -translate-x-full lg:translate-x-0 transition-transform duration-300 absolute lg:relative z-10 h-full">
            <nav class="flex-1 overflow-y-auto custom-scroll p-4">
                <ul class="space-y-2">
                    <li>
                        <button onclick="switchPage('chat')" class="menu-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100" data-page="chat">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                            </svg>
                            <span class="font-medium">对话</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="switchPage('tasks')" class="menu-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100" data-page="tasks">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                            </svg>
                            <span class="font-medium">任务</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="switchPage('skills')" class="menu-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100" data-page="skills">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
                            </svg>
                            <span class="font-medium">技能</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="switchPage('mcp')" class="menu-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100" data-page="mcp">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path>
                            </svg>
                            <span class="font-medium">MCP</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="switchPage('logs')" class="menu-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100" data-page="logs">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                            <span class="font-medium">日志</span>
                        </button>
                    </li>
                </ul>
            </nav>
            <div class="p-4 border-t">
                <div class="text-xs text-gray-500 text-center">
                    SolonClaw v1.0.0
                </div>
            </div>
        </aside>

        <!-- 侧边栏遮罩 -->
        <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/50 z-0 lg:hidden"></div>

        <!-- 主内容区 -->
        <main class="flex-1 overflow-hidden">
            <div id="pageContainer" class="h-full overflow-y-auto custom-scroll">
                <!-- 页面内容将通过 iframe 加载 -->
                <iframe id="contentFrame" class="w-full h-full border-0" src="pages/chat.html"></iframe>
            </div>
        </main>
    </div>

    <script src="RequestUtil.js?v=1.0"></script>
    <script src="main.js?v=1.0"></script>
</body>
</html>
