# Agent 请注意：这是只读参考模板，请不要修改本文件；需要变更运行配置时请修改同目录的 config.yml。
# solonclaw 运行配置示例。
# 使用方式：复制为 workspace/config.yml，再按部署环境修改。

# HTTP 服务配置。
server:
  # Dashboard 与 API 监听端口。
  port: 8080

# 模型提供方列表。键名是 providerKey，可在 model.providerKey 和 fallbackProviders 中引用。
providers:
  # 默认云端模型提供方。
  default:
    # 提供方显示名称。
    name: DefaultProvider
    # 模型接口基础地址。
    baseUrl: https://api.openai.com
    # 模型接口密钥。生产环境请替换为真实密钥，避免提交到代码仓库。
    apiKey: ""
    # 该提供方默认使用的模型。
    defaultModel: gpt-5.4
    # 可在 Profile、Cron 和后台任务中选择的模型；支持一个 Provider 配置多个模型。
    models:
      - gpt-5.4
    # 协议类型，可选 openai、openai-responses、ollama、gemini、anthropic。
    dialect: openai-responses
    # 显式模型能力元数据；未填写的字段才会回退到协议或模型家族推断。
    capabilities:
      tool_calling: true
      vision: true
      audio: false
      attachment: true
      pdf: true
      reasoning: true
      structured_output: true
      open_weights: false
      interleaved: false
      prompt_cache: true
      streaming: true
  # 本地 Ollama 示例提供方。
  local-ollama:
    # 提供方显示名称。
    name: Local Ollama
    # Ollama 本地服务地址。
    baseUrl: http://127.0.0.1:11434
    # Ollama 默认不需要密钥，留空即可。
    apiKey: ""
    # Ollama 默认模型名。
    defaultModel: qwen3
    # 该 Provider 可选择的模型清单，也可在 Dashboard 中远程拉取或手动添加。
    models:
      - qwen3
    # 协议类型。
    dialect: ollama

# 当前默认模型选择。
model:
  # 当前默认提供方键名，必须命中 providers 下的键。
  providerKey: default
  # 可选默认模型覆盖值；留空时使用 providers.<providerKey>.defaultModel。
  default: ""

# 模型故障转移列表。主提供方失败时按顺序尝试。
fallbackProviders: []
# 故障转移配置示例。
# fallbackProviders:
#   # 备用提供方键名，必须命中 providers。
#   - provider: local-ollama
#     # 备用模型名；留空时使用该提供方 defaultModel。
#     model: qwen3

# 安全策略配置。包含 URL、网站阻断、命令扫描与审批模式。
security:
  # 是否允许 URL 工具访问内网/私有地址；默认关闭，云元数据地址始终阻断。
  allowPrivateUrls: false
  # URL 工具的网站阻断策略。
  websiteBlocklist:
    # 是否启用域名阻断。
    enabled: false
    # 阻断域名列表，支持 example.com 和 *.example.com。
    domains: []
    # 共享阻断列表文件；相对路径按 workspace 目录解析。
    sharedFiles: []
  # 是否启用 Tirith 命令内容安全扫描；对齐对标行为 security.tirith_enabled。
  tirithEnabled: true
  # Tirith 可执行文件路径。默认从 PATH 查找 tirith，也可填绝对路径。
  tirithPath: tirith
  # Tirith 扫描超时时间，单位秒。
  tirithTimeoutSeconds: 5
  # Tirith 不可用、超时或返回未知退出码时是否放行；默认 true 表示 fail-open 放行，对齐外部对标仓库行为。
  tirithFailOpen: true
  # 文件路径安全预检模式：strict 默认阻断，bypass 仅跳过该类软预检。
  fileGuardrailMode: strict
  # URL 安全预检模式：strict 默认阻断，bypass 仅跳过该类软预检。
  urlGuardrailMode: strict
  # Agent 工具安全策略模式：
  # approval 默认值，可审批危险行为会生成待审批项，hardline 仍直接阻断。
  # bypass 最自由，会跳过可审批危险行为检查。
  # smart 先由辅助模型判定低风险行为，无法确认时回到人工审批。
  guardrailMode: approval
  # 定时任务安全策略模式：
  # strict 默认值，无人值守任务命中可审批危险行为时直接阻断。
  # approval 会暂停任务并请求原会话审批。
  # bypass 会跳过软策略；approve 会自动批准可审批危险行为。
  guardrailCronMode: strict
  # 定时任务审批记忆范围：job 同一任务相同行为审批一次；session 按会话；global 全局。
  guardrailCronScope: job
  # 可显式放行的 hardline 类别；默认空列表，不放行任何类别。
  hardlineAllowlist: []

# 审批/确认策略配置。危险命令策略以 security.guardrailMode 和 security.guardrailCronMode 为准。
approvals:
  # 子 Agent 遇到可审批危险命令时是否自动批准一次；默认拒绝。
  subagentAutoApprove: false
  # 所有审批（包括消息渠道）的统一超时秒数；超时后 /approve 不再放行过期命令。
  timeoutSeconds: 180
  # /reload-mcp 会让下一轮模型请求重新发送完整工具 schema，默认需要确认。
  # 设为 false 后，/reload-mcp 将直接执行。
  mcpReloadConfirm: true
  # 危险操作智能审批专用 Provider；留空时沿用当前 Profile 主模型。
  modelProvider: ""
  # 危险操作智能审批专用模型；留空时沿用当前 Profile 主模型。
  model: ""
  # 用户自定义不可绕过的命令 deny 列表，支持 glob 通配（* 和 ?）。
  # 即使 guardrailMode 设为 bypass 也不放过，用于补充内置 hardline 规则。
  # 例如：禁止 git push --force 和 docker 容器停止。
  deny: []

solonclaw:
  # Dashboard 与 API 访问配置。
  dashboard:
    # Dashboard 页面和 /api/* 请求共用的 Bearer Token；留空时非公开 API 拒绝鉴权。
    # 生产环境必须设置为高强度随机值，禁止使用 admin 等弱口令。
    accessToken: ""

  # 默认 LLM 运行参数。
  llm:
    # 是否启用流式输出。
    stream: true
    # 推理强度，具体效果取决于模型协议与提供方支持。
    reasoningEffort: medium
    # 采样温度。
    temperature: 0.2
    # 单次回复最大输出 token 数。
    maxTokens: 4096
    # 模型上下文窗口 token。设为 0（默认）时按模型自动识别：
    # 先查 models.dev/OpenRouter 在线目录，再查内置模型族目录，最后用 contextFallbackTokens 兜底。
    # 设为大于 0 的值时作为全局强制覆盖。
    contextWindowTokens: 0
    # 自动识别失败时的兜底上下文窗口 token，对齐外部对标仓库默认 256K。
    contextFallbackTokens: 256000
    # 是否启用 models.dev/OpenRouter 在线目录刷新，用于自动识别模型上下文长度。
    modelsDevRefreshEnabled: true
    # 提示词缓存配置；当前仅声明本地策略与用量统计承载，具体 provider 支持由协议适配决定。
    promptCache:
      enabled: false
      ttl: 5m
      layout: system_and_3

  # 浏览器工具在容器内访问宿主机 loopback 服务时的 URL 改写配置。
  browser:
    # 是否把导航里的 127.0.0.1/localhost 改写为宿主机别名。
    rewriteLoopbackUrls: false
    # 宿主机别名；Docker Desktop 常用 host.docker.internal。
    loopbackHostAlias: host.docker.internal

  # 定时任务调度器配置。
  scheduler:
    # 是否启用定时任务调度。
    enabled: true
    # 调度器扫描间隔，单位秒。
    tickSeconds: 60
    # 是否默认为定时任务投递结果加上任务名等包装信息；对应对标行为 cron.wrap_response。
    wrapResponse: true
    # cron 脚本执行超时时间，单位秒。
    scriptTimeoutSeconds: 120
    # cron Agent 无活动超时时间，单位秒；0 表示不限制。
    inactivityTimeoutSeconds: 600
    # 未设置 job.enabled_toolsets 时，cron 平台默认启用的工具集；空列表表示沿用全部默认工具。
    # cron 运行时始终会额外禁用 cronjob / messaging / clarify，避免无人值守递归调度或主动发消息。
    enabledToolsets: []
    # Cron 任务未单独绑定模型时使用的 Provider；留空时沿用当前 Profile 主模型。
    defaultProvider: ""
    # Cron 任务未单独绑定模型时使用的模型；留空时沿用当前 Profile 主模型。
    defaultModel: ""

  # MCP 工具适配配置。
  mcp:
    # 是否启用 MCP 工具适配。
    enabled: false
    # MCP 服务器 OAuth 认证配置（全局默认，可被单个服务器的 oauth_json 覆盖）。
    oauth:
      # OAuth 客户端 ID。
      clientId: ""
      # OAuth 客户端密钥；建议通过环境变量注入，不要明文写入配置文件。
      clientSecret: ""
      # OAuth token 端点 URL，例如 https://auth.example.com/oauth/token。
      tokenUrl: ""
      # OAuth 请求的 scope，多个 scope 用空格分隔。
      scope: ""

  # 模型价格配置。默认 gpt-5.4 没有内置价格，prices 为空时明确记录为 unknown 和 unpriced token。
  pricing:
    prices: []
    # prices:
    #   - provider: your-provider
    #     model: your-model
    #     currency: USD
    #     # 以下仅展示配置格式；请替换为该模型官方每百万 token 价格。
    #     input_cost_per_million: "1.00"
    #     output_cost_per_million: "4.00"
    #     cache_read_cost_per_million: "0.50"

  # Web 工具配置。默认复用 Solon AI 内置 websearch/webfetch；也可使用内置 Brave 或 DuckDuckGo 搜索。
  web:
    # 搜索后端：solon-ai / brave-free / ddgs。
    searchBackend: solon-ai
    # Brave Search API key；也可通过环境变量 BRAVE_SEARCH_API_KEY 提供。
    braveSearchApiKey: ""

  # TTS 与独立 STT 配置；均使用 OpenAI 兼容 HTTP 协议，可分别指向不同服务。
  speech:
    # 文本转语音 Provider；默认关闭，避免未配置时对外虚报可用。
    tts:
      # 是否启用内置 TTS Provider。
      enabled: false
      # 完整的 /audio/speech 请求地址。
      endpoint: https://api.openai.com/v1/audio/speech
      # 服务密钥；本地免鉴权兼容服务可留空。
      apiKey: ""
      # 默认语音合成模型。
      model: gpt-4o-mini-tts
      # 默认音色。
      voice: alloy
      # 输出格式：mp3、opus、aac、flac、wav、pcm。
      responseFormat: mp3
      # 默认语速，范围 0.25 到 4.0。
      speed: 1.0
      # HTTP 请求超时秒数。
      timeoutSeconds: 120
    # 独立语音转写 Provider，可使用不同端点、密钥和模型。
    stt:
      # 是否启用内置 STT Provider。
      enabled: false
      # 完整的 /audio/transcriptions 请求地址。
      endpoint: https://api.openai.com/v1/audio/transcriptions
      # 服务密钥；本地免鉴权兼容服务可留空。
      apiKey: ""
      # 默认语音转写模型。
      model: gpt-4o-mini-transcribe
      # 可选默认语言代码；留空时自动识别。
      language: ""
      # 可选转写提示词，用于补充专有名词或语言上下文。
      prompt: ""
      # HTTP 请求超时秒数。
      timeoutSeconds: 120

  # 上下文压缩配置。
  compression:
    # 是否启用上下文压缩。
    enabled: true
    # 触发压缩的上下文占用比例。
    thresholdPercent: 0.5
    # 压缩摘要专用 Provider；留空时使用当前 Profile 主模型。
    summaryProvider: ""
    # 可选压缩摘要模型；留空时使用当前默认模型。
    summaryModel: ""
    # 压缩时保护开头消息数量。
    protectHeadMessages: 3
    # 压缩时保留尾部消息比例。
    tailRatio: 0.2

  # 自动学习配置。
  learning:
    # 是否启用主回复后的自动技能/经验沉淀。
    enabled: true
    # 触发自动学习所需的最少工具调用数。
    toolCallThreshold: 5
    # 自动学习分类/技能总结等辅助模型调用的总超时，单位秒。
    auxiliaryTimeoutSeconds: 60
    # 对话后复盘、记忆和技能维护专用 Provider；留空时沿用当前 Profile 主模型。
    modelProvider: ""
    # 对话后复盘、记忆和技能维护专用模型；留空时沿用当前 Profile 主模型。
    model: ""

  # 旧每日记忆生命周期配置。
  memory:
    archive:
      # 是否启用不可变原文归档和可重建派生摘要。
      enabled: true
      # 每日记忆在 memory/ 根目录保留的天数。
      retentionDays: 30
      # 后台检查周期，单位小时；修改后重启生效。
      intervalHours: 24
      # 单轮最多归档或补摘要的文件数。
      maxFilesPerRun: 7
      # 是否优先使用 AI 分析真实条目；失败时自动使用数据驱动摘要。
      aiSummaryEnabled: true
      # 单个 AI 摘要调用超时，单位秒。
      auxiliaryTimeoutSeconds: 60

  # goal 目标循环配置：跨轮长目标 + judge 驱动自动续轮
  goal:
    maxTurns: 20              # 默认轮次预算上限，超过自动暂停
    judgeTimeoutSeconds: 30   # judge 辅助模型调用超时（秒）
    judgeMaxTokens: 4096      # judge 最大 token
    judgeProvider: ""         # judge 使用的 provider，留空用会话默认
    judgeModel: ""            # judge 使用的 model，留空用会话默认
    maxConsecutiveParseFailures: 3  # 连续 JSON 解析失败上限，超过自动暂停

  # 技能后台维护配置。
  skills:
    # 额外只读技能目录；可使用绝对路径或相对 workspace 的路径。
    externalDirs: []
    # 是否启用 SKILL.md 模板变量替换。
    templateVars: true
    # 是否允许 SKILL.md inline shell 预处理。
    inlineShell: false
    # inline shell 预处理超时，单位秒。
    inlineShellTimeoutSeconds: 10
    curator:
      # 是否启用 Curator 后台巡检。
      enabled: true
      # 巡检周期，单位小时。
      intervalHours: 168
      # Agent 空闲多久后才允许运行，单位小时。
      minIdleHours: 2
      # 多久未触达后标记 stale。
      staleAfterDays: 30
      # 多久未触达后标记 archived；不会自动删除。
      archiveAfterDays: 90

  # 跨会话反思配置。
  reflection:
    # 是否启用基于近期真实会话的跨会话反思。
    enabled: true
    # 反思运行周期，单位小时。
    intervalHours: 24
    # 读取真实会话的回看天数。
    lookbackDays: 7

  # checkpoint 回滚配置。
  rollback:
    # 是否启用 checkpoint 回滚。
    enabled: true
    # 每个来源保留的最大 checkpoint 数。
    maxCheckpointsPerSource: 20
    # 单个文件超过此大小时不进入 checkpoint，避免快照目录膨胀。
    maxFileSizeMb: 10
    # checkpoint 默认排除构建产物、依赖目录、大二进制和密钥文件；可按需追加或覆盖。
    excludePatterns:
      - node_modules/
      - dist/
      - build/
      - target/
      - .git/
      - .worktrees/
      - "*.jar"
      - "*.class"
      - "*.mp4"
      - "*.zip"
      - ".env"
      - ".envrc"
      - ".env.*"
      - "*.log"

  # 中间态显示配置。
  display:
    # 默认工具进度模式：off 不显示，new 仅显示新工具，all 显示每次调用，verbose 显示完整参数。
    toolProgress: off
    # 是否默认展示 reasoning/思考中间态。
    showReasoning: false
    # 恢复会话时是否展示紧凑历史：full 展示，minimal 只恢复不展示历史。
    resumeDisplay: full
    # 工具参数预览最大长度。
    toolPreviewLength: 80
    # 中间态消息节流间隔，单位毫秒。
    progressThrottleMs: 5000
    # 最终 agent 回复 metadata footer；默认关闭，避免污染普通聊天。
    metadataFooter:
      # 是否追加 metadata footer。
      enabled: false
      # footer 字段，可选 model、provider、context_pct、cwd、tokens。
      fields:
        - model
        - context_pct
        - cwd
    # 渠道级 footer 覆盖；未配置时继承全局开关。
    platforms:
      feishu:
        metadataFooter:
          enabled: false
      dingtalk:
        metadataFooter:
          enabled: false
      wecom:
        metadataFooter:
          enabled: false
      weixin:
        metadataFooter:
          enabled: false
      qqbot:
        metadataFooter:
          enabled: false
      yuanbao:
        metadataFooter:
          enabled: false

  # 运行轨迹配置。
  trace:
    # 运行轨迹保留天数。
    retentionDays: 14
    # 每个 run 最大外层 attempt 数。
    maxAttempts: 2
    # 工具结果预览最大长度。
    toolPreviewLength: 1200

  # ReAct 推理控制配置。
  react:
    # 主代理单轮最大推理步数。
    maxSteps: 12
    # 主代理决策失败后的最大重试次数。
    retryMax: 3
    # 主代理决策重试基础延迟，单位毫秒。
    retryDelayMs: 2000
    # 子代理单轮最大推理步数。
    delegateMaxSteps: 18
    # 子代理决策失败后的最大重试次数。
    delegateRetryMax: 4
    # 子代理决策重试基础延迟，单位毫秒。
    delegateRetryDelayMs: 2500
    # 是否启用 ReAct 工作记忆摘要守卫。
    summarizationEnabled: true
    # ReAct 摘要守卫触发的消息数量阈值。
    summarizationMaxMessages: 40
    # ReAct 摘要守卫触发的 token 阈值。
    summarizationMaxTokens: 32000
    # 是否启用重复工具调用软提醒。默认只提醒，不阻断工具执行。
    toolLoopWarningsEnabled: true
    # 是否启用重复工具调用硬停。开启后，相同失败或只读无进展达到阈值会停止本轮。
    toolLoopHardStopEnabled: false
    # 相同工具和相同参数连续失败达到该次数后，在工具结果中追加提醒。
    toolLoopExactFailureWarnAfter: 2
    # 相同工具和相同参数连续失败达到该次数后，硬停模式下阻断下一次执行。
    toolLoopExactFailureBlockAfter: 5
    # 同一工具连续失败达到该次数后，在工具结果中追加提醒。
    toolLoopSameToolFailureWarnAfter: 3
    # 同一工具连续失败达到该次数后，硬停模式下终止本轮。
    toolLoopSameToolFailureHaltAfter: 8
    # 只读工具相同参数连续返回相同结果达到该次数后，在工具结果中追加提醒。
    toolLoopNoProgressWarnAfter: 2
    # 只读工具相同参数连续返回相同结果达到该次数后，硬停模式下阻断下一次执行。
    toolLoopNoProgressBlockAfter: 5

  # 任务运行策略配置。
  task:
    # 运行中收到新消息时的处理策略：queue 排队、steer 注入当前 run、interrupt 打断重跑、reject 拒绝。
    busyPolicy: interrupt
    # /restart 等待运行中任务自然完成的最长时间，单位秒；0 表示不等待，立即让服务管理器重启。
    restartDrainTimeoutSeconds: 180
    # stale run 判定窗口，单位分钟。
    staleAfterMinutes: 60
    # 子 Agent 最大并发数。
    subagentMaxConcurrency: 3
    # 子 Agent 最大 spawn 深度。
    subagentMaxDepth: 1
    # 单个工具输出超过该字节数时写入 workspace/cache/tool-results，只把预览和 result_ref 放回上下文。
    toolOutputInlineLimit: 50000
    # 同一轮工具输出累计超过该字节数时，后续工具输出也会落盘，避免上下文被工具结果挤满。
    toolOutputTurnBudget: 200000
    # 单个静态上下文块的最大字符数；超出后在完整 Unicode 边界截断并保留可见标记。
    bootstrapPromptFileCharLimit: 12000
    # 静态系统提示词总字符预算；规则、人格、长期记忆、近期记忆按优先级动态使用剩余额度。
    bootstrapPromptTotalCharBudget: 48000
    # 供文件读取/分页输出限制使用。
    toolOutputMaxLines: 2000
    # 供单行输出截断使用。
    toolOutputMaxLineLength: 2000
    # 媒体缓存 TTL，单位小时。
    mediaCacheTtlHours: 168

  # 终端/沙箱执行配置。
  terminal:
    # 这里的文件路径必须相对 workspace 目录，禁止绝对路径和 .. 穿越。
    # 用于后续远程终端/沙箱执行时把本机凭据只读挂载到隔离环境内。
    credentialFiles: []
    # 默认本地子进程不会继承 API key/token/secret。
    # 这里仅用于明确放行第三方技能变量；模型、渠道、网关等内置凭据仍会被强制拦截。
    envPassthrough: []
    # 非 Windows 本地 shell 执行前会静默 source 这些文件。
    # 留空时会按 autoSourceBashrc 规则自动尝试 ~/.profile、~/.bash_profile、~/.bashrc。
    shellInitFiles: []
    # 用于让 nvm/asdf/pyenv 等写入 shell rc 的 PATH 初始化在工具进程可见。
    autoSourceBashrc: true
    # 可选 sudo 密码；也可通过环境变量 SOLONCLAW_SUDO_PASSWORD 提供。配置非空值后会通过 stdin 注入给 sudo -S。
    # 留空时不改写 sudo，避免在未配置凭据时改变命令行为；不要在共享配置中保存真实密码。
    sudoPassword: ""
    # 前台 terminal 最大超时时间，单位秒。
    maxForegroundTimeoutSeconds: 600
    # 前台 terminal 执行遇到运行时异常时的自动重试次数；默认 3 次。
    foregroundMaxRetries: 3
    # 前台 terminal 异常重试的指数退避基准秒数；默认 2 秒，即 2/4/8。
    foregroundRetryBaseDelaySeconds: 2
    # 对齐 TERMINAL_TIMEOUT。限制 process(action=wait) 单次阻塞时长，模型传入更大值时会自动钳制。
    processWaitTimeoutSeconds: 180

  # Agent 行为配置。
  agent:
    # 心跳任务配置。
    heartbeat:
      # 心跳间隔，单位分钟；0 表示不启用自动心跳。
      intervalMinutes: 15
    # 预定义人格配置。
    personalities:
      # 默认友好人格。
      helpful:
        # 人格说明。
        description: 友好、通用的默认助手
        # 人格系统提示词。
        systemPrompt: 你是一个友好、可靠的中文技术助手，优先给出准确、可执行的答案。
      # 简洁人格。
      concise:
        # 人格说明。
        description: 简洁直接，优先最短有效答案
        # 人格系统提示词。
        systemPrompt: 你是一个非常简洁的中文技术助手，只输出解决问题所需的最少内容。
      # 工程技术人格。
      technical:
        # 人格说明。
        description: 偏工程化，强调原因、边界与验证
        # 人格系统提示词。
        systemPrompt: 你是一个工程导向的中文技术助手，回答时强调约束、原因、风险和验证方式。
        # 人格语气说明。
        tone: 冷静、直接
        # 人格表达风格说明。
        style: 优先用清晰术语描述系统行为和实现边界

  # 主动提醒配置。模型按 PROACTIVITY_ANALYSIS.md 调整频率，并按 PROACTIVE.md 生成消息。
  proactive:
    # 是否启用主动提醒。
    enabled: true
    # 初始联系间隔，单位小时；默认每 4 小时独立评估一次。
    intervalHours: 4
    # 投递目标；main 表示最近的主对话。
    deliveryTarget: main
    # 同一话题再次提醒前至少间隔的小时数。
    topicCooldownHours: 8
    # 是否启用免打扰时段。
    quietHoursEnabled: true
    # 免打扰起止时间，格式为 HH:mm。
    quietStart: "22:00"
    quietEnd: "08:00"
    # 主动监控和重要性分类专用 Provider；留空时沿用当前 Profile 主模型。
    modelProvider: ""
    # 主动监控和重要性分类专用模型；留空时沿用当前 Profile 主模型。
    model: ""

  # 国内消息渠道配置。
  channels:
    # 飞书渠道配置。
    feishu:
      # 是否启用飞书渠道。
      enabled: false
      # 飞书应用 App ID。
      appId: ""
      # 飞书应用 App Secret。
      appSecret: ""
      # 飞书 websocket 入口地址；留空时使用默认接入逻辑。
      websocketUrl: ""
      # 飞书允许访问的用户 ID 列表。
      allowedUsers: []
      # 飞书是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 飞书私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 飞书群聊策略：open、allowlist、disabled。
      groupPolicy: allowlist
      # 飞书允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 群聊会话硬白名单；非空时只响应列表内群聊，私聊不受影响。
      allowedChats: []
      # 飞书机器人 open_id。
      botOpenId: ""
      # 飞书机器人 user_id。
      botUserId: ""
      # 飞书机器人名称。
      botName: ""
      # 飞书工具进度模式：off、new、all、verbose。
      toolProgress: off
      # 飞书文档评论智能回复；启用后会监听 drive.notice.comment_add_v1。
      comment:
        enabled: false
        # 可选配对文件，JSON 形如 {"docx:file_token":["open_id"], "*":["open_id"]}。
        pairingFile: workspace/feishu_comment_pairing.json

    # 钉钉渠道配置。
    dingtalk:
      # 是否启用钉钉渠道。
      enabled: false
      # 钉钉应用 Client ID。
      clientId: ""
      # 钉钉应用 Client Secret。
      clientSecret: ""
      # 钉钉机器人编码。
      robotCode: ""
      # 钉钉酷应用编码，可选。
      coolAppCode: ""
      # 钉钉 stream mode 入口地址。
      streamUrl: ""
      # 钉钉允许访问的用户 ID 列表。
      allowedUsers: []
      # 钉钉是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 钉钉私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 钉钉群聊策略：open、allowlist、disabled。
      groupPolicy: open
      # 钉钉允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 钉钉群聊会话硬白名单；非空时只响应列表内群聊，私聊不受影响。
      allowedChats: []
      # 钉钉工具进度模式：off、new、all、verbose。
      toolProgress: off
      # 钉钉长任务进度卡片模板 ID；留空时使用文本消息。
      progressCardTemplateId: ""
      # AI Card 增量更新开关；关闭后 update 请求会回退为普通文本投递。
      aiCardStreaming:
        enabled: true

    # 企业微信渠道配置。
    wecom:
      # 是否启用企业微信渠道。
      enabled: false
      # 企业微信 Bot ID。
      botId: ""
      # 企业微信 Bot Secret。
      secret: ""
      # 企业微信 websocket 入口地址。
      websocketUrl: ""
      # 企业微信允许访问的用户 ID 列表。
      allowedUsers: []
      # 企业微信是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 企业微信私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 企业微信群聊策略：open、allowlist、disabled。
      groupPolicy: open
      # 企业微信允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 企业微信群成员级白名单配置。
      groups:
        # 示例群 ID。
        example_group_id:
          # 该群内允许触发机器人的成员 ID 列表。
          allowFrom: []
      # 企业微信工具进度模式：off、new、all、verbose。
      toolProgress: off

    # 微信渠道配置。
    weixin:
      # 是否启用微信渠道。
      enabled: true
      # 微信 iLink 登录令牌。
      token: ""
      # 微信账号 ID。
      accountId: ""
      # 微信 iLink API 基础地址。
      baseUrl: https://ilinkai.weixin.qq.com
      # 微信媒体 CDN 基础地址。
      cdnBaseUrl: https://novac2c.cdn.weixin.qq.com/c2c
      # 微信 long-poll 地址；留空时使用默认接口。
      longPollUrl: ""
      # 微信允许访问的用户 ID 列表。
      allowedUsers: []
      # 微信是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 微信私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 微信群聊策略：open、allowlist、disabled。
      groupPolicy: disabled
      # 微信允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 是否按多行强制拆分微信文本消息。
      splitMultilineMessages: false
      # 微信入站文本批量延迟，单位秒；连续短文本会合并为一次对话触发。
      textBatchDelaySeconds: 3.0
      # 微信长文本分片入站批量延迟，单位秒。
      textBatchSplitDelaySeconds: 5.0
      # 微信分片发送间隔，单位秒。
      sendChunkDelaySeconds: 0.35
      # 微信分片发送失败后的重试次数。
      sendChunkRetries: 2
      # 微信分片重试间隔，单位秒。
      sendChunkRetryDelaySeconds: 1.0
      # 微信工具进度模式；默认 off，避免向微信频繁发送工具调用中间态。
      toolProgress: off

    # QQBot 渠道配置。
    qqbot:
      # 是否启用 QQBot 渠道。
      enabled: false
      # QQBot App ID。
      appId: ""
      # QQBot Client Secret。
      clientSecret: ""
      # QQBot REST API 域名。
      apiDomain: https://api.sgroup.qq.com
      # QQBot websocket 地址；留空时从 /gateway 获取。
      websocketUrl: ""
      # 是否使用 QQBot Markdown 消息。
      markdownSupport: true
      # QQBot 允许访问的用户 ID 列表。
      allowedUsers: []
      # QQBot 是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # QQBot 私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # QQBot 群聊策略：open、allowlist、disabled。
      groupPolicy: open
      # QQBot 允许访问的群 ID 列表。
      groupAllowedUsers: []
      # QQBot 工具进度模式：off、new、all、verbose。
      toolProgress: off

    # 腾讯元宝渠道配置。
    yuanbao:
      # 是否启用腾讯元宝渠道。
      enabled: false
      # 元宝 App ID。
      appId: ""
      # 元宝 App Secret。
      appSecret: ""
      # 元宝 Bot ID。
      botId: ""
      # 元宝 REST API 域名。
      apiDomain: https://bot.yuanbao.tencent.com
      # 元宝 websocket 地址。
      websocketUrl: wss://bot-wss.yuanbao.tencent.com/wss/connection
      # 元宝允许访问的用户 ID 列表。
      allowedUsers: []
      # 元宝是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 元宝私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 元宝群聊策略：open、allowlist、disabled。
      groupPolicy: open
      # 元宝允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 元宝工具进度模式：off、new、all、verbose。
      toolProgress: off

  # 网关通用授权与注入配置。
  gateway:
    # 是否让 default Profile 的单个网关进程承载全部 Profile；默认关闭。
    # 开启后命名 Profile 不再单独启动网关，统一由 default 网关管理生命周期。
    multiplexProfiles: false
    # 全局允许访问的用户 ID 列表。
    allowedUsers: []
    # 是否全局允许所有用户访问。
    allowAllUsers: false
    # 外部注入消息接口签名密钥；留空时禁用签名密钥校验。
    injectionSecret: ""
    # 外部注入消息最大请求体大小，单位字节。
    injectionMaxBodyBytes: 65536
    # 外部注入消息防重放窗口，单位秒。
    injectionReplayWindowSeconds: 300
    # 是否过滤短静默旁白，避免渠道收到无意义状态文本。
    filterSilenceNarration: true
    # 各平台工具集权限配置；键为平台名称（大写），值为该平台的工具集策略。
    # 未配置的平台使用全局默认工具集，不受限制。
    platforms:
      # 飞书平台：只允许 web 和 file 工具集。
      FEISHU:
        enabledToolsets: [web, file]
        disabledToolsets: []
        approvalRequired: false
      # 钉钉平台：允许 web、terminal 和 file 工具集。
      DINGTALK:
        enabledToolsets: [web, terminal, file]
        disabledToolsets: []
        approvalRequired: false

  # 应用更新检查配置。
  update:
    # 代码仓库地址；留空时不覆盖默认来源。
    repo: ""
    # Release API 地址；留空时按 repo 推导。
    releaseApiUrl: ""
    # Tags API 地址；留空时按 repo 推导。
    tagsApiUrl: ""
    # 更新检查使用的 HTTP 代理。
    httpProxy: ""

  # 外部集成配置。
  integrations:
    # GitHub 集成配置。
    github:
      # GitHub Personal Access Token。
      token: ""
      # GitHub CLI 使用的 Token。
      cliToken: ""
      # GitHub App ID。
      appId: ""
      # GitHub App 私钥文件路径。
      privateKeyPath: ""
      # GitHub App installation ID。
      installationId: ""

  # PDF 相关配置。
  pdf:
    # PDF 渲染或生成使用的字体路径；留空时使用内置/系统默认字体。
    fontPath: ""
