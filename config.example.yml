# Agent 请注意：这是只读参考模板，请不要修改本文件；需要变更运行配置时请修改同目录的 config.yml。
# SolonClaw 运行配置示例。
# 使用方式：复制为 runtime/config.yml，再按部署环境修改。

# HTTP 服务配置。
server:
  # Dashboard 与 API 监听端口。
  port: 8080

# 模型提供方列表。键名是 providerKey，可在 model.providerKey 和 fallbackProviders 中引用。
providers:
  # 默认云端模型提供方。
  default:
    # 提供方显示名称。
    name: DefaultProvider
    # 模型接口基础地址。
    baseUrl: https://api.openai.com
    # 模型接口密钥。生产环境请替换为真实密钥，避免提交到代码仓库。
    apiKey: ""
    # 该提供方默认使用的模型。
    defaultModel: gpt-5.4
    # 协议类型，可选 openai、openai-responses、ollama、gemini、anthropic。
    dialect: openai
  # 本地 Ollama 示例提供方。
  local-ollama:
    # 提供方显示名称。
    name: Local Ollama
    # Ollama 本地服务地址。
    baseUrl: http://127.0.0.1:11434
    # Ollama 默认不需要密钥，留空即可。
    apiKey: ""
    # Ollama 默认模型名。
    defaultModel: qwen3
    # 协议类型。
    dialect: ollama

# 当前默认模型选择。
model:
  # 当前默认提供方键名，必须命中 providers 下的键。
  providerKey: default
  # 可选默认模型覆盖值；留空时使用 providers.<providerKey>.defaultModel。
  default: ""

# 模型故障转移列表。主提供方失败时按顺序尝试。
fallbackProviders: []
# 故障转移配置示例。
# fallbackProviders:
#   # 备用提供方键名，必须命中 providers。
#   - provider: local-ollama
#     # 备用模型名；留空时使用该提供方 defaultModel。
#     model: qwen3

# 安全策略配置。包含 URL、网站阻断、命令扫描、审批模式与 hardline 白名单。
security:
  # 是否允许 URL 工具访问内网/私有地址，默认关闭，避免工具被诱导访问内网资源。
  # 云元数据地址默认始终阻断，不会因本开关放行。
  # 仅在可信内网调试场景显式设为 true。
  allowPrivateUrls: false
  # URL 工具的网站阻断策略，用于 webfetch/websearch/codesearch 中出现的 URL。
  websiteBlocklist:
    # 是否启用域名阻断。
    enabled: false
    # 阻断域名列表，支持 example.com 和 *.example.com。
    domains: []
    # 共享阻断列表文件；相对路径按 runtime 目录解析。每行一个域名规则，支持注释和空行。
    sharedFiles: []
  # 是否启用 Tirith 命令内容安全扫描；对齐对标行为 security.tirith_enabled。
  tirithEnabled: true
  # Tirith 可执行文件路径。默认从 PATH 查找 tirith，也可填绝对路径。
  tirithPath: tirith
  # Tirith 扫描超时时间，单位秒。
  tirithTimeoutSeconds: 5
  # Tirith 不可用、超时或返回未知退出码时是否放行；默认 false 表示 fail-closed 阻断。
  tirithFailOpen: false
  # 文件路径安全预检模式：
  # strict 默认值，会对 execute_code/终端/进程命令阻断敏感系统或凭据路径。
  # bypass 仅适合完全可信的本机临时联调环境。
  fileGuardrailMode: strict
  # URL 安全预检模式：
  # strict 默认值，会对 execute_code/终端/进程命令阻断 metadata、敏感 URL 参数等风险 URL。
  # bypass 仅适合完全可信的本机临时联调环境。
  urlGuardrailMode: strict
  # Agent 工具安全策略模式：
  # approval 默认值，可审批危险行为会生成待审批项，非白名单 hardline 仍直接阻断。
  # bypass 最自由，会跳过可审批危险行为检查；文件/URL 预检由 fileGuardrailMode/urlGuardrailMode 单独控制。
  # strict 最严格，可审批危险行为也直接阻断。
  # smart 先由辅助模型判定低风险行为，无法确认时回到人工审批。
  guardrailMode: approval
  # 定时任务安全策略模式：
  # strict 默认值，直接阻断可审批危险行为，避免无人值守任务自动放行。
  # approval 可审批危险行为会暂停任务并请求会话审批。
  # bypass 会跳过软策略；approve 会自动批准可审批危险行为。
  guardrailCronMode: strict
  # 定时任务审批记忆范围：job 同一任务相同行为审批一次；session 按会话；global 全局。
  guardrailCronScope: job
  # 允许跳过 hardline 硬阻断的类别；* 表示放行所有 hardline 类别。
  # 默认空列表，关机/重启、metadata URL 等 hardline 类别均直接阻断。
  hardlineAllowlist: []

# 审批/确认策略配置。危险命令策略以 security.guardrailMode 和 security.guardrailCronMode 为准。
approvals:
  # 子 Agent 遇到危险命令时默认自动拒绝，避免等待父本地交互/stdin 审批导致卡死。
  # 设为 true 后，子 Agent 会自动批准一次；仅建议可信批处理使用。
  subagentAutoApprove: false
  # 本地/直接审批超时秒数；超时后 /approve 不再放行过期命令。
  timeoutSeconds: 60
  # 网关/渠道审批超时秒数；用于消息渠道中的审批卡与 /approve。
  gatewayTimeoutSeconds: 300
  # /reload-mcp 会让下一轮模型请求重新发送完整工具 schema，默认需要确认。
  # 设为 false 后，/reload-mcp 将直接执行。
  mcpReloadConfirm: true

# SolonClaw 运行时配置。
solonclaw:
  # Agent 工作区目录；相对路径按运行 Jar 所在目录解析。
  workspace: ./workspace

  # Dashboard 与 API 访问配置。
  dashboard:
    # Dashboard 页面和 /api/* 请求共用的 Bearer Token；留空时非公开 API 拒绝鉴权。
    # 生产环境必须设置为高强度随机值，禁止使用 admin 等弱口令。
    accessToken: ""

  # 默认 LLM 运行参数。
  llm:
    # 是否启用流式输出。
    stream: true
    # 推理强度，具体效果取决于模型协议与提供方支持。
    reasoningEffort: medium
    # 采样温度。
    temperature: 0.2
    # 单次回复最大输出 token 数。
    maxTokens: 4096
    # 模型上下文窗口 token 估算值。
    contextWindowTokens: 128000
    # 提示词缓存配置；当前仅声明本地策略与用量统计承载，具体 provider 支持由协议适配决定。
    promptCache:
      enabled: false
      ttl: 5m
      layout: system_and_3

  # 浏览器工具在容器内访问宿主机 loopback 服务时的 URL 改写配置。
  browser:
    # 是否把导航里的 127.0.0.1/localhost 改写为宿主机别名。
    rewriteLoopbackUrls: false
    # 宿主机别名；Docker Desktop 常用 host.docker.internal。
    loopbackHostAlias: host.docker.internal

  # 定时任务调度器配置。
  scheduler:
    # 是否启用定时任务调度。
    enabled: true
    # 调度器扫描间隔，单位秒。
    tickSeconds: 60
    # 是否默认为定时任务投递结果加上任务名等包装信息；对应对标行为 cron.wrap_response。
    wrapResponse: true
    # cron 脚本执行超时时间，单位秒。
    scriptTimeoutSeconds: 120
    # cron Agent 无活动超时时间，单位秒；0 表示不限制。
    inactivityTimeoutSeconds: 600
    # 未设置 job.enabled_toolsets 时，cron 平台默认启用的工具集；空列表表示沿用全部默认工具。
    # cron 运行时始终会额外禁用 cronjob / messaging / clarify，避免无人值守递归调度或主动发消息。
    enabledToolsets: []

  # MCP 工具适配配置。
  mcp:
    # 是否启用 MCP 工具适配。
    enabled: false
    # MCP 服务器 OAuth 认证配置（全局默认，可被单个服务器的 oauth_json 覆盖）。
    oauth:
      # OAuth 客户端 ID。
      clientId: ""
      # OAuth 客户端密钥；建议通过环境变量注入，不要明文写入配置文件。
      clientSecret: ""
      # OAuth token 端点 URL，例如 https://auth.example.com/oauth/token。
      tokenUrl: ""
      # OAuth 请求的 scope，多个 scope 用空格分隔。
      scope: ""

  # 模型价格配置。单位为每 token 的 micros；留空表示只统计 token，不计算价格。
  pricing:
    prices: []
    # prices:
    #   - provider: default
    #     model: gpt-5.4
    #     currency: USD
    #     input_micros_per_token: 0
    #     output_micros_per_token: 0
    #     cache_read_micros_per_token: 0
    #     cache_write_micros_per_token: 0
    #     reasoning_micros_per_token: 0

  # 插件启停配置。enabled 允许指定插件加载；disabled 无条件跳过指定插件。
  plugins:
    enabled: []
    disabled: []

  # Web 工具配置。默认复用 Solon AI 内置 websearch/webfetch；可选 brave-free 或 ddgs。
  web:
    # 搜索后端：solon-ai / brave-free / ddgs。
    searchBackend: solon-ai
    # Brave Search API key；也可通过环境变量 BRAVE_SEARCH_API_KEY 提供。
    braveSearchApiKey: ""

  # 上下文压缩配置。
  compression:
    # 是否启用上下文压缩。
    enabled: true
    # 触发压缩的上下文占用比例。
    thresholdPercent: 0.5
    # 可选压缩摘要模型；留空时使用当前默认模型。
    summaryModel: ""
    # 压缩时保护开头消息数量。
    protectHeadMessages: 3
    # 压缩时保留尾部消息比例。
    tailRatio: 0.2

  # 自动学习配置。
  learning:
    # 是否启用主回复后的自动技能/经验沉淀。
    enabled: true
    # 触发自动学习所需的最少工具调用数。
    toolCallThreshold: 5
    # 自动学习分类/技能总结等辅助模型调用的总超时，单位秒。
    auxiliaryTimeoutSeconds: 60

  # 技能后台维护配置。
  skills:
    # 额外只读技能目录；可使用绝对路径或相对 runtime 的路径。
    externalDirs: []
    # 是否启用 SKILL.md 模板变量替换。
    templateVars: true
    # 是否允许 SKILL.md inline shell 预处理。
    inlineShell: false
    # inline shell 预处理超时，单位秒。
    inlineShellTimeoutSeconds: 10
    curator:
      # 是否启用 Curator 后台巡检。
      enabled: true
      # 巡检周期，单位小时。
      intervalHours: 168
      # Agent 空闲多久后才允许运行，单位小时。
      minIdleHours: 2
      # 多久未触达后标记 stale。
      staleAfterDays: 30
      # 多久未触达后标记 archived；不会自动删除。
      archiveAfterDays: 90

  # checkpoint 回滚配置。
  rollback:
    # 是否启用 checkpoint 回滚。
    enabled: true
    # 每个来源保留的最大 checkpoint 数。
    maxCheckpointsPerSource: 20
    # 单个文件超过此大小时不进入 checkpoint，避免快照目录膨胀。
    maxFileSizeMb: 10
    # checkpoint 默认排除构建产物、依赖目录、大二进制和密钥文件；可按需追加或覆盖。
    excludePatterns:
      - node_modules/
      - dist/
      - build/
      - target/
      - .git/
      - .worktrees/
      - "*.jar"
      - "*.class"
      - "*.mp4"
      - "*.zip"
      - ".env"
      - ".envrc"
      - ".env.*"
      - "*.log"

  # 中间态显示配置。
  display:
    # 默认工具进度模式：off 不显示，new 仅显示新工具，all 显示每次调用，verbose 显示完整参数。
    toolProgress: all
    # 是否默认展示 reasoning/思考中间态。
    showReasoning: false
    # 恢复会话时是否展示紧凑历史：full 展示，minimal 只恢复不展示历史。
    resumeDisplay: full
    # 工具参数预览最大长度。
    toolPreviewLength: 80
    # 中间态消息节流间隔，单位毫秒。
    progressThrottleMs: 1500
    # 最终 agent 回复 runtime metadata footer；默认关闭，避免污染普通聊天。
    runtimeFooter:
      # 是否追加 runtime footer。
      enabled: false
      # footer 字段，可选 model、provider、context_pct、cwd、tokens。
      fields:
        - model
        - context_pct
        - cwd
    # 渠道级 footer 覆盖；未配置时继承全局开关。
    platforms:
      feishu:
        runtimeFooter:
          enabled: false
      dingtalk:
        runtimeFooter:
          enabled: false
      wecom:
        runtimeFooter:
          enabled: false
      weixin:
        runtimeFooter:
          enabled: false
      qqbot:
        runtimeFooter:
          enabled: false
      yuanbao:
        runtimeFooter:
          enabled: false

  # 运行轨迹配置。
  trace:
    # 运行轨迹保留天数。
    retentionDays: 14
    # 每个 run 最大外层 attempt 数。
    maxAttempts: 2
    # 工具结果预览最大长度。
    toolPreviewLength: 1200

  # ReAct 推理控制配置。
  react:
    # 主代理单轮最大推理步数。
    maxSteps: 12
    # 主代理决策失败后的最大重试次数。
    retryMax: 3
    # 主代理决策重试基础延迟，单位毫秒。
    retryDelayMs: 2000
    # 子代理单轮最大推理步数。
    delegateMaxSteps: 18
    # 子代理决策失败后的最大重试次数。
    delegateRetryMax: 4
    # 子代理决策重试基础延迟，单位毫秒。
    delegateRetryDelayMs: 2500
    # 是否启用 ReAct 工作记忆摘要守卫。
    summarizationEnabled: true
    # ReAct 摘要守卫触发的消息数量阈值。
    summarizationMaxMessages: 40
    # ReAct 摘要守卫触发的 token 阈值。
    summarizationMaxTokens: 32000
    # 是否启用重复工具调用软提醒。默认只提醒，不阻断工具执行。
    toolLoopWarningsEnabled: true
    # 是否启用重复工具调用硬停。开启后，相同失败或只读无进展达到阈值会停止本轮。
    toolLoopHardStopEnabled: false
    # 相同工具和相同参数连续失败达到该次数后，在工具结果中追加提醒。
    toolLoopExactFailureWarnAfter: 2
    # 相同工具和相同参数连续失败达到该次数后，硬停模式下阻断下一次执行。
    toolLoopExactFailureBlockAfter: 5
    # 同一工具连续失败达到该次数后，在工具结果中追加提醒。
    toolLoopSameToolFailureWarnAfter: 3
    # 同一工具连续失败达到该次数后，硬停模式下终止本轮。
    toolLoopSameToolFailureHaltAfter: 8
    # 只读工具相同参数连续返回相同结果达到该次数后，在工具结果中追加提醒。
    toolLoopNoProgressWarnAfter: 2
    # 只读工具相同参数连续返回相同结果达到该次数后，硬停模式下阻断下一次执行。
    toolLoopNoProgressBlockAfter: 5

  # 任务运行策略配置。
  task:
    # 运行中收到新消息时的处理策略：queue 排队、steer 注入当前 run、interrupt 打断重跑、reject 拒绝。
    busyPolicy: interrupt
    # /restart 等待运行中任务自然完成的最长时间，单位秒；0 表示不等待，立即让服务管理器重启。
    restartDrainTimeoutSeconds: 180
    # stale run 判定窗口，单位分钟。
    staleAfterMinutes: 60
    # 子 Agent 最大并发数。
    subagentMaxConcurrency: 3
    # 子 Agent 最大 spawn 深度。
    subagentMaxDepth: 1
    # 单个工具输出超过该字节数时写入 runtime/cache/tool-results，只把预览和 result_ref 放回上下文。
    toolOutputInlineLimit: 50000
    # 同一轮工具输出累计超过该字节数时，后续工具输出也会落盘，避免上下文被工具结果挤满。
    toolOutputTurnBudget: 200000
    # 供文件读取/分页输出限制使用。
    toolOutputMaxLines: 2000
    # 供单行输出截断使用。
    toolOutputMaxLineLength: 2000
    # 媒体缓存 TTL，单位小时。
    mediaCacheTtlHours: 168

  # 终端/沙箱执行配置。
  terminal:
    # 这里的文件路径必须相对 runtime 目录，禁止绝对路径和 .. 穿越。
    # 用于后续远程终端/沙箱执行时把本机凭据只读挂载到隔离环境内。
    credentialFiles: []
    # 默认本地子进程不会继承 API key/token/secret。
    # 这里仅用于明确放行第三方技能变量；模型、渠道、网关等内置凭据仍会被强制拦截。
    envPassthrough: []
    # 非 Windows 本地 shell 执行前会静默 source 这些文件。
    # 留空时会按 autoSourceBashrc 规则自动尝试 ~/.profile、~/.bash_profile、~/.bashrc。
    shellInitFiles: []
    # 用于让 nvm/asdf/pyenv 等写入 shell rc 的 PATH 初始化在工具进程可见。
    autoSourceBashrc: true
    # 可选 sudo 密码；也可通过环境变量 SOLONCLAW_SUDO_PASSWORD 提供。配置非空值后会通过 stdin 注入给 sudo -S。
    # 留空时不改写 sudo，避免在未配置凭据时改变命令行为；不要在共享配置中保存真实密码。
    sudoPassword: ""
    # 前台 terminal 最大超时时间，单位秒。
    maxForegroundTimeoutSeconds: 600
    # 前台 terminal 执行遇到运行时异常时的自动重试次数；默认 3 次。
    foregroundMaxRetries: 3
    # 前台 terminal 异常重试的指数退避基准秒数；默认 2 秒，即 2/4/8。
    foregroundRetryBaseDelaySeconds: 2
    # 对齐 TERMINAL_TIMEOUT。限制 process(action=wait) 单次阻塞时长，模型传入更大值时会自动钳制。
    processWaitTimeoutSeconds: 180

  # Agent 行为配置。
  agent:
    # 心跳任务配置。
    heartbeat:
      # 心跳间隔，单位分钟；0 表示不启用自动心跳。
      intervalMinutes: 15
    # 预定义人格配置。
    personalities:
      # 默认友好人格。
      helpful:
        # 人格说明。
        description: 友好、通用的默认助手
        # 人格系统提示词。
        systemPrompt: 你是一个友好、可靠的中文技术助手，优先给出准确、可执行的答案。
      # 简洁人格。
      concise:
        # 人格说明。
        description: 简洁直接，优先最短有效答案
        # 人格系统提示词。
        systemPrompt: 你是一个非常简洁的中文技术助手，只输出解决问题所需的最少内容。
      # 工程技术人格。
      technical:
        # 人格说明。
        description: 偏工程化，强调原因、边界与验证
        # 人格系统提示词。
        systemPrompt: 你是一个工程导向的中文技术助手，回答时强调约束、原因、风险和验证方式。
        # 人格语气说明。
        tone: 冷静、直接
        # 人格表达风格说明。
        style: 优先用清晰术语描述系统行为和实现边界

  # 主动协作配置。主动协作会观察会话、运行状态、记忆、仓库更新和定时任务结果，寻找值得询问用户的协作机会。
  # 它不是固定提醒类型；只会先询问用户是否需要处理，不会在未确认时直接执行动作。
  # 主动协作投递复用现有 home channel / 国内消息渠道投递链路，不单独新增外部投递入口。
  proactive:
    # 是否启用主动协作调度。
    enabled: true
    # 主动协作扫描间隔，单位分钟。
    intervalMinutes: 30
    # 服务启动后首次扫描前的延迟，单位秒。
    initialDelaySeconds: 60
    # 单日最多主动触达次数，限制打扰频率。
    dailyMaxContacts: 3
    # 同一用户或会话两次主动触达之间的冷却时间，单位分钟。
    cooldownMinutes: 120
    # 免打扰开始小时，使用 0-23 的本地小时。
    quietStartHour: 23
    # 免打扰结束小时，使用 0-23 的本地小时。
    quietEndHour: 8
    # 允许主动触达的最低候选置信度，低于该值仅记录不投递。
    minConfidenceToContact: 0.65
    # 是否启用大模型辅助判断候选事项是否值得主动触达。
    llmDecisionEnabled: true
    # 是否启用大模型润色主动协作投递文案。
    llmPolishEnabled: true
    # 单次扫描最多评估的候选事项数量。
    maxCandidatesPerTick: 20
    # 单次扫描最多实际触达次数。
    maxContactsPerTick: 1
    # 候选事项有效期，单位小时。
    candidateTtlHours: 72
    # 是否启用仓库状态检查候选源；仅使用只读探测，不拉取、不切换、不写入仓库。
    repositoryCheckEnabled: true
    # 仓库状态检查的最小间隔，单位分钟。
    repositoryCheckIntervalMinutes: 360
    # 会话记录回看窗口，单位天。
    sessionLookbackDays: 30
    # Agent 运行记录回看窗口，单位天。
    runLookbackDays: 14
    # 定时任务记录回看窗口，单位天。
    cronLookbackDays: 14
    # 是否启用长时间空闲后的关怀式确认候选，用于询问最近是否有工作需要协作。
    careCheckinEnabled: true
    # 用户长时间无互动后触发关怀候选的空闲阈值，单位小时。
    careCheckinAfterIdleHours: 48
    # 主动协作投递预览前缀，用于渠道消息中标识触达来源。
    deliveryPreviewPrefix: 主动协作

  # 国内消息渠道配置。
  channels:
    # 飞书渠道配置。
    feishu:
      # 是否启用飞书渠道。
      enabled: false
      # 飞书应用 App ID。
      appId: ""
      # 飞书应用 App Secret。
      appSecret: ""
      # 飞书 websocket 入口地址；留空时使用默认接入逻辑。
      websocketUrl: ""
      # 飞书允许访问的用户 ID 列表。
      allowedUsers: []
      # 飞书是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 飞书私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 飞书群聊策略：open、allowlist、disabled。
      groupPolicy: allowlist
      # 飞书允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 群聊会话硬白名单；非空时只响应列表内群聊，私聊不受影响。
      allowedChats: []
      # 飞书机器人 open_id。
      botOpenId: ""
      # 飞书机器人 user_id。
      botUserId: ""
      # 飞书机器人名称。
      botName: ""
      # 飞书工具进度模式：off、new、all、verbose。
      toolProgress: all
      # 飞书文档评论智能回复；启用后会监听 drive.notice.comment_add_v1。
      comment:
        enabled: false
        # 可选配对文件，JSON 形如 {"docx:file_token":["open_id"], "*":["open_id"]}。
        pairingFile: runtime/feishu_comment_pairing.json

    # 钉钉渠道配置。
    dingtalk:
      # 是否启用钉钉渠道。
      enabled: false
      # 钉钉应用 Client ID。
      clientId: ""
      # 钉钉应用 Client Secret。
      clientSecret: ""
      # 钉钉机器人编码。
      robotCode: ""
      # 钉钉酷应用编码，可选。
      coolAppCode: ""
      # 钉钉 stream mode 入口地址。
      streamUrl: ""
      # 钉钉允许访问的用户 ID 列表。
      allowedUsers: []
      # 钉钉是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 钉钉私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 钉钉群聊策略：open、allowlist、disabled。
      groupPolicy: open
      # 钉钉允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 钉钉群聊会话硬白名单；非空时只响应列表内群聊，私聊不受影响。
      allowedChats: []
      # 钉钉工具进度模式：off、new、all、verbose。
      toolProgress: all
      # 钉钉长任务进度卡片模板 ID；留空时使用文本消息。
      progressCardTemplateId: ""
      # AI Card 增量更新开关；关闭后 update 请求会回退为普通文本投递。
      aiCardStreaming:
        enabled: true

    # 企业微信渠道配置。
    wecom:
      # 是否启用企业微信渠道。
      enabled: false
      # 企业微信 Bot ID。
      botId: ""
      # 企业微信 Bot Secret。
      secret: ""
      # 企业微信 websocket 入口地址。
      websocketUrl: ""
      # 企业微信允许访问的用户 ID 列表。
      allowedUsers: []
      # 企业微信是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 企业微信私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 企业微信群聊策略：open、allowlist、disabled。
      groupPolicy: open
      # 企业微信允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 企业微信群成员级白名单配置。
      groups:
        # 示例群 ID。
        example_group_id:
          # 该群内允许触发机器人的成员 ID 列表。
          allowFrom: []
      # 企业微信工具进度模式：off、new、all、verbose。
      toolProgress: all

    # 微信渠道配置。
    weixin:
      # 是否启用微信渠道。
      enabled: true
      # 微信 iLink 登录令牌。
      token: ""
      # 微信账号 ID。
      accountId: ""
      # 微信 iLink API 基础地址。
      baseUrl: https://ilinkai.weixin.qq.com
      # 微信媒体 CDN 基础地址。
      cdnBaseUrl: https://novac2c.cdn.weixin.qq.com/c2c
      # 微信 long-poll 地址；留空时使用默认接口。
      longPollUrl: ""
      # 微信允许访问的用户 ID 列表。
      allowedUsers: []
      # 微信是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 微信私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 微信群聊策略：open、allowlist、disabled。
      groupPolicy: disabled
      # 微信允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 是否按多行强制拆分微信文本消息。
      splitMultilineMessages: false
      # 微信入站文本批量延迟，单位秒；连续短文本会合并为一次对话触发。
      textBatchDelaySeconds: 3.0
      # 微信长文本分片入站批量延迟，单位秒。
      textBatchSplitDelaySeconds: 5.0
      # 微信分片发送间隔，单位秒。
      sendChunkDelaySeconds: 0.35
      # 微信分片发送失败后的重试次数。
      sendChunkRetries: 2
      # 微信分片重试间隔，单位秒。
      sendChunkRetryDelaySeconds: 1.0
      # 微信工具进度模式；默认 off，避免向微信频繁发送工具调用中间态。
      toolProgress: off

    # QQBot 渠道配置。
    qqbot:
      # 是否启用 QQBot 渠道。
      enabled: false
      # QQBot App ID。
      appId: ""
      # QQBot Client Secret。
      clientSecret: ""
      # QQBot REST API 域名。
      apiDomain: https://api.sgroup.qq.com
      # QQBot websocket 地址；留空时从 /gateway 获取。
      websocketUrl: ""
      # 是否使用 QQBot Markdown 消息。
      markdownSupport: true
      # QQBot 允许访问的用户 ID 列表。
      allowedUsers: []
      # QQBot 是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # QQBot 私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # QQBot 群聊策略：open、allowlist、disabled。
      groupPolicy: open
      # QQBot 允许访问的群 ID 列表。
      groupAllowedUsers: []
      # QQBot 工具进度模式：off、new、all、verbose。
      toolProgress: all

    # 腾讯元宝渠道配置。
    yuanbao:
      # 是否启用腾讯元宝渠道。
      enabled: false
      # 元宝 App ID。
      appId: ""
      # 元宝 App Secret。
      appSecret: ""
      # 元宝 Bot ID。
      botId: ""
      # 元宝 REST API 域名。
      apiDomain: https://bot.yuanbao.tencent.com
      # 元宝 websocket 地址。
      websocketUrl: wss://bot-wss.yuanbao.tencent.com/wss/connection
      # 元宝允许访问的用户 ID 列表。
      allowedUsers: []
      # 元宝是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 元宝私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 元宝群聊策略：open、allowlist、disabled。
      groupPolicy: open
      # 元宝允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 元宝工具进度模式：off、new、all、verbose。
      toolProgress: all

  # 网关通用授权与注入配置。
  gateway:
    # 全局允许访问的用户 ID 列表。
    allowedUsers: []
    # 是否全局允许所有用户访问。
    allowAllUsers: false
    # 外部注入消息接口签名密钥；留空时禁用签名密钥校验。
    injectionSecret: ""
    # 外部注入消息最大请求体大小，单位字节。
    injectionMaxBodyBytes: 65536
    # 外部注入消息防重放窗口，单位秒。
    injectionReplayWindowSeconds: 300
    # 是否过滤短静默旁白，避免渠道收到无意义状态文本。
    filterSilenceNarration: true
    # 各平台工具集权限配置；键为平台名称（大写），值为该平台的工具集策略。
    # 未配置的平台使用全局默认工具集，不受限制。
    platforms:
      # 飞书平台：只允许 web 和 file 工具集。
      FEISHU:
        enabledToolsets: [web, file]
        disabledToolsets: []
        approvalRequired: false
      # 钉钉平台：允许 web、terminal 和 file 工具集。
      DINGTALK:
        enabledToolsets: [web, terminal, file]
        disabledToolsets: []
        approvalRequired: false

  # 应用更新检查配置。
  update:
    # 代码仓库地址；留空时不覆盖默认来源。
    repo: ""
    # Release API 地址；留空时按 repo 推导。
    releaseApiUrl: ""
    # Tags API 地址；留空时按 repo 推导。
    tagsApiUrl: ""
    # 更新检查使用的 HTTP 代理。
    httpProxy: ""

  # 外部集成配置。
  integrations:
    # GitHub 集成配置。
    github:
      # GitHub Personal Access Token。
      token: ""
      # GitHub CLI 使用的 Token。
      cliToken: ""
      # GitHub App ID。
      appId: ""
      # GitHub App 私钥文件路径。
      privateKeyPath: ""
      # GitHub App installation ID。
      installationId: ""

  # PDF 相关配置。
  pdf:
    # PDF 渲染或生成使用的字体路径；留空时使用内置/系统默认字体。
    fontPath: ""
