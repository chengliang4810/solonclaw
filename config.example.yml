# Agent 请注意：这是只读参考模板，请不要修改本文件；需要变更运行配置时请修改同目录的 config.yml。
# SolonClaw 运行配置示例。
# 使用方式：复制为 runtime/config.yml，再按部署环境修改。

# 模型提供方列表。键名是 providerKey，可在 model.providerKey 和 fallbackProviders 中引用。
providers:
  # 默认云端模型提供方。
  default:
    # 提供方显示名称。
    name: DefaultProvider
    # 模型接口基础地址。
    baseUrl: https://api.openai.com
    # 模型接口密钥。生产环境请替换为真实密钥，避免提交到代码仓库。
    apiKey: ""
    # 该提供方默认使用的模型。
    defaultModel: gpt-5.4
    # 协议类型，可选 openai、openai-responses、ollama、gemini、anthropic。
    dialect: openai
  # 本地 Ollama 示例提供方。
  local-ollama:
    # 提供方显示名称。
    name: Local Ollama
    # Ollama 本地服务地址。
    baseUrl: http://127.0.0.1:11434
    # Ollama 默认不需要密钥，留空即可。
    apiKey: ""
    # Ollama 默认模型名。
    defaultModel: qwen3
    # 协议类型。
    dialect: ollama

# 当前默认模型选择。
model:
  # 当前默认提供方键名，必须命中 providers 下的键。
  providerKey: default
  # 可选默认模型覆盖值；留空时使用 providers.<providerKey>.defaultModel。
  default: ""

# 模型故障转移列表。主提供方失败时按顺序尝试。
fallbackProviders: []
# 故障转移配置示例。
# fallbackProviders:
#   # 备用提供方键名，必须命中 providers。
#   - provider: local-ollama
#     # 备用模型名；留空时使用该提供方 defaultModel。
#     model: qwen3

# SolonClaw 运行时配置。
solonclaw:
  # Dashboard 与 API 访问配置。
  dashboard:
    # Dashboard 页面和 /api/* 请求共用的 Bearer Token。
    accessToken: "admin"

  # 默认 LLM 运行参数。
  llm:
    # 是否启用流式输出。
    stream: true
    # 推理强度，具体效果取决于模型协议与提供方支持。
    reasoningEffort: medium
    # 采样温度。
    temperature: 0.2
    # 单次回复最大输出 token 数。
    maxTokens: 4096
    # 模型上下文窗口 token 估算值。
    contextWindowTokens: 128000

  # 定时任务调度器配置。
  scheduler:
    # 是否启用定时任务调度。
    enabled: true
    # 调度器扫描间隔，单位秒。
    tickSeconds: 60
    # 是否默认为定时任务投递结果加上任务名等包装信息；对应 Hermes cron.wrap_response。
    wrapResponse: true
    # cron 脚本执行超时时间，单位秒；对应 Hermes cron.script_timeout_seconds / HERMES_CRON_SCRIPT_TIMEOUT。
    scriptTimeoutSeconds: 120
    # 无人值守 cron 遇到危险命令时的处理方式：deny 表示阻断，approve 表示沿用普通危险命令审批放行策略。
    # 对齐 Hermes approvals.cron_mode；默认 deny，避免定时任务在无人确认时执行破坏性命令。
    cronApprovalMode: deny
    # 未设置 job.enabled_toolsets 时，cron 平台默认启用的工具集；空列表表示沿用全部默认工具。
    # 对齐 Hermes cron 平台工具配置回退。cron 运行时始终会额外禁用 cronjob / messaging / clarify，避免无人值守递归调度或主动发消息。
    enabledToolsets: []

  # 安全策略配置。对齐 Hermes 的 hardline、URL safety、website policy 基线。
  security:
    # 是否允许 URL 工具访问内网/私有地址。云元数据地址始终阻断，无法通过本开关放行。
    allowPrivateUrls: false
    # URL 工具的网站阻断策略，用于 webfetch/websearch/codesearch 中出现的 URL。
    websiteBlocklist:
      # 是否启用域名阻断。
      enabled: false
      # 阻断域名列表，支持 example.com 和 *.example.com。
      domains: []
      # 共享阻断列表文件；相对路径按 runtime 目录解析。每行一个域名规则，支持注释和空行。
      sharedFiles: []
    # 是否启用 Tirith 命令内容安全扫描；对齐 Hermes security.tirith_enabled。
    tirithEnabled: true
    # Tirith 可执行文件路径。默认从 PATH 查找 tirith，也可填绝对路径。
    tirithPath: tirith
    # Tirith 扫描超时时间，单位秒。
    tirithTimeoutSeconds: 5
    # Tirith 不可用、超时或返回未知退出码时是否放行。设为 false 会 fail-closed 阻断。
    tirithFailOpen: true

  # 审批/确认策略配置。对齐 Hermes approvals.mcp_reload_confirm。
  approvals:
    # 危险命令审批模式：on 开启人工审批；off 关闭可审批危险命令提示；smart 先由辅助模型判定低风险命令，无法确认时回到人工审批。
    # hardline 命令、URL 安全策略和凭据文件策略始终阻断，不受 off 影响。
    mode: on
    # cron 无人值守遇到危险命令时的处理方式：deny 阻断，approve 允许可审批危险命令直接运行。
    # 旧配置 solonclaw.scheduler.cronApprovalMode 仍兼容，但建议迁移到本字段。
    cronMode: deny
    # 本地/直接审批超时秒数；超时后 /approve 不再放行旧命令。
    timeoutSeconds: 60
    # 网关/渠道审批超时秒数；用于消息渠道中的审批卡与 /approve。
    gatewayTimeoutSeconds: 300
    # /reload-mcp 会让下一轮模型请求重新发送完整工具 schema，默认需要确认。
    # 设为 false 后，/reload-mcp 将直接执行。
    mcpReloadConfirm: true

  # 上下文压缩配置。
  compression:
    # 是否启用上下文压缩。
    enabled: true
    # 触发压缩的上下文占用比例。
    thresholdPercent: 0.5
    # 可选压缩摘要模型；留空时使用当前默认模型。
    summaryModel: ""
    # 压缩时保护开头消息数量。
    protectHeadMessages: 3
    # 压缩时保留尾部消息比例。
    tailRatio: 0.2

  # 自动学习配置。
  learning:
    # 是否启用主回复后的自动技能/经验沉淀。
    enabled: true
    # 触发自动学习所需的最少工具调用数。
    toolCallThreshold: 5

  # 技能后台维护配置。
  skills:
    curator:
      # 是否启用 Curator 后台巡检。
      enabled: true
      # 巡检周期，单位小时。
      intervalHours: 168
      # Agent 空闲多久后才允许运行，单位小时。
      minIdleHours: 2
      # 多久未触达后标记 stale。
      staleAfterDays: 30
      # 多久未触达后标记 archived；不会自动删除。
      archiveAfterDays: 90

  # checkpoint 回滚配置。
  rollback:
    # 是否启用 checkpoint 回滚。
    enabled: true
    # 每个来源保留的最大 checkpoint 数。
    maxCheckpointsPerSource: 20
    # 单个文件超过此大小时不进入 checkpoint，避免快照目录膨胀。
    maxFileSizeMb: 10
    # checkpoint 默认排除构建产物、依赖目录、大二进制和密钥文件；可按需追加或覆盖。
    excludePatterns:
      - node_modules/
      - dist/
      - build/
      - target/
      - .git/
      - .worktrees/
      - "*.jar"
      - "*.class"
      - "*.mp4"
      - "*.zip"
      - ".env"
      - ".env.*"
      - "*.log"

  # 中间态显示配置。
  display:
    # 默认工具进度模式：off 不显示，new 仅显示新工具，all 显示每次调用，verbose 显示完整参数。
    toolProgress: all
    # 是否默认展示 reasoning/思考中间态。
    showReasoning: false
    # 恢复会话时是否展示紧凑历史：full 展示，minimal 只恢复不展示历史。
    resumeDisplay: full
    # 工具参数预览最大长度。
    toolPreviewLength: 80
    # 中间态消息节流间隔，单位毫秒。
    progressThrottleMs: 1500
    # 最终 agent 回复 runtime metadata footer；默认关闭，避免污染普通聊天。
    runtimeFooter:
      # 是否追加 runtime footer。
      enabled: false
      # footer 字段，可选 model、provider、context_pct、cwd、tokens。
      fields:
        - model
        - context_pct
        - cwd
    # 渠道级 footer 覆盖；未配置时继承全局开关。
    platforms:
      feishu:
        runtimeFooter:
          enabled: false
      dingtalk:
        runtimeFooter:
          enabled: false
      wecom:
        runtimeFooter:
          enabled: false
      weixin:
        runtimeFooter:
          enabled: false
      qqbot:
        runtimeFooter:
          enabled: false
      yuanbao:
        runtimeFooter:
          enabled: false

  # ReAct 推理控制配置。
  react:
    # 主代理单轮最大推理步数。
    maxSteps: 12
    # 主代理决策失败后的最大重试次数。
    retryMax: 3
    # 主代理决策重试基础延迟，单位毫秒。
    retryDelayMs: 2000
    # 子代理单轮最大推理步数。
    delegateMaxSteps: 18
    # 子代理决策失败后的最大重试次数。
    delegateRetryMax: 4
    # 子代理决策重试基础延迟，单位毫秒。
    delegateRetryDelayMs: 2500
    # 是否启用 ReAct 工作记忆摘要守卫。
    summarizationEnabled: true
    # ReAct 摘要守卫触发的消息数量阈值。
    summarizationMaxMessages: 40
    # ReAct 摘要守卫触发的 token 阈值。
    summarizationMaxTokens: 32000
    # 是否启用重复工具调用软提醒。默认只提醒，不阻断工具执行。
    toolLoopWarningsEnabled: true
    # 是否启用重复工具调用硬停。开启后，相同失败或只读无进展达到阈值会停止本轮。
    toolLoopHardStopEnabled: false
    # 相同工具和相同参数连续失败达到该次数后，在工具结果中追加提醒。
    toolLoopExactFailureWarnAfter: 2
    # 相同工具和相同参数连续失败达到该次数后，硬停模式下阻断下一次执行。
    toolLoopExactFailureBlockAfter: 5
    # 同一工具连续失败达到该次数后，在工具结果中追加提醒。
    toolLoopSameToolFailureWarnAfter: 3
    # 同一工具连续失败达到该次数后，硬停模式下终止本轮。
    toolLoopSameToolFailureHaltAfter: 8
    # 只读工具相同参数连续返回相同结果达到该次数后，在工具结果中追加提醒。
    toolLoopNoProgressWarnAfter: 2
    # 只读工具相同参数连续返回相同结果达到该次数后，硬停模式下阻断下一次执行。
    toolLoopNoProgressBlockAfter: 5

  # 任务运行策略配置。
  task:
    # 运行中收到新消息时的处理策略：queue 排队、steer 注入当前 run、interrupt 打断重跑、reject 拒绝。
    busyPolicy: interrupt
    # 单个工具输出超过该字节数时写入 runtime/cache/tool-results，只把预览和 result_ref 放回上下文。
    toolOutputInlineLimit: 50000
    # 同一轮工具输出累计超过该字节数时，后续工具输出也会落盘，避免上下文被工具结果挤满。
    toolOutputTurnBudget: 200000
    # 对齐 Hermes tool_output.max_lines，供文件读取/分页输出限制使用。
    toolOutputMaxLines: 2000
    # 对齐 Hermes tool_output.max_line_length，供单行输出截断使用。
    toolOutputMaxLineLength: 2000

  # Hermes 兼容工具输出限制别名。max_bytes 会映射到 task.toolOutputInlineLimit。
  tool_output:
    max_bytes: 50000
    max_lines: 2000
    max_line_length: 2000

  # 终端/沙箱执行配置。
  terminal:
    # 对齐 Hermes terminal.credential_files。这里的文件路径必须相对 runtime 目录，禁止绝对路径和 .. 穿越。
    # 用于后续远程终端/沙箱执行时把本机凭据只读挂载到容器内 /root/.jimuqu-agent/<path>。
    credentialFiles: []
    # 可选 sudo 密码；也可通过环境变量 SUDO_PASSWORD 提供。用于把实际 sudo 命令改写为 sudo -S -p ''。
    # 留空时不改写 sudo，避免在未配置凭据时改变命令行为。
    sudoPassword: ""
    # 对齐 Hermes HERMES_WRITE_SAFE_ROOT / terminal.write_safe_root。
    # 留空表示不限制普通工作区写入；填写后 file_write/patch/shell 写入只能落在该目录内。
    writeSafeRoot: ""

  # Agent 行为配置。
  agent:
    # 心跳任务配置。
    heartbeat:
      # 心跳间隔，单位分钟；0 表示不启用自动心跳。
      intervalMinutes: 15
    # 预定义人格配置。
    personalities:
      # 默认友好人格。
      helpful:
        # 人格说明。
        description: 友好、通用的默认助手
        # 人格系统提示词。
        systemPrompt: 你是一个友好、可靠的中文技术助手，优先给出准确、可执行的答案。
      # 简洁人格。
      concise:
        # 人格说明。
        description: 简洁直接，优先最短有效答案
        # 人格系统提示词。
        systemPrompt: 你是一个非常简洁的中文技术助手，只输出解决问题所需的最少内容。
      # 工程技术人格。
      technical:
        # 人格说明。
        description: 偏工程化，强调原因、边界与验证
        # 人格系统提示词。
        systemPrompt: 你是一个工程导向的中文技术助手，回答时强调约束、原因、风险和验证方式。
        # 人格语气说明。
        tone: 冷静、直接
        # 人格表达风格说明。
        style: 优先用清晰术语描述系统行为和实现边界

  # 国内消息渠道配置。
  channels:
    # 飞书渠道配置。
    feishu:
      # 是否启用飞书渠道。
      enabled: false
      # 飞书应用 App ID。
      appId: ""
      # 飞书应用 App Secret。
      appSecret: ""
      # 飞书 websocket 入口地址；留空时使用默认接入逻辑。
      websocketUrl: ""
      # 飞书允许访问的用户 ID 列表。
      allowedUsers: []
      # 飞书是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 飞书私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 飞书群聊策略：open、allowlist、disabled。
      groupPolicy: allowlist
      # 飞书允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 飞书机器人 open_id。
      botOpenId: ""
      # 飞书机器人 user_id。
      botUserId: ""
      # 飞书机器人名称。
      botName: ""
      # 飞书工具进度模式：off、new、all、verbose。
      toolProgress: all
      # 飞书文档评论智能回复；启用后会监听 drive.notice.comment_add_v1。
      comment:
        enabled: false
        # 可选配对文件，JSON 形如 {"docx:file_token":["open_id"], "*":["open_id"]}。
        pairingFile: runtime/feishu_comment_pairing.json

    # 钉钉渠道配置。
    dingtalk:
      # 是否启用钉钉渠道。
      enabled: false
      # 钉钉应用 Client ID。
      clientId: ""
      # 钉钉应用 Client Secret。
      clientSecret: ""
      # 钉钉机器人编码。
      robotCode: ""
      # 钉钉酷应用编码，可选。
      coolAppCode: ""
      # 钉钉 stream mode 入口地址。
      streamUrl: ""
      # 钉钉允许访问的用户 ID 列表。
      allowedUsers: []
      # 钉钉是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 钉钉私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 钉钉群聊策略：open、allowlist、disabled。
      groupPolicy: open
      # 钉钉允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 钉钉工具进度模式：off、new、all、verbose。
      toolProgress: all
      # 钉钉长任务进度卡片模板 ID；留空时使用文本消息。
      progressCardTemplateId: ""
      # AI Card 增量更新开关；关闭后 update 请求会回退为普通文本投递。
      aiCardStreaming:
        enabled: true

    # 企业微信渠道配置。
    wecom:
      # 是否启用企业微信渠道。
      enabled: false
      # 企业微信 Bot ID。
      botId: ""
      # 企业微信 Bot Secret。
      secret: ""
      # 企业微信 websocket 入口地址。
      websocketUrl: ""
      # 企业微信允许访问的用户 ID 列表。
      allowedUsers: []
      # 企业微信是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 企业微信私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 企业微信群聊策略：open、allowlist、disabled。
      groupPolicy: open
      # 企业微信允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 企业微信群成员级白名单配置。
      groups:
        # 示例群 ID。
        example_group_id:
          # 该群内允许触发机器人的成员 ID 列表。
          allowFrom: []
      # 企业微信工具进度模式：off、new、all、verbose。
      toolProgress: all

    # 微信渠道配置。
    weixin:
      # 是否启用微信渠道。
      enabled: true
      # 微信 iLink 登录令牌。
      token: ""
      # 微信账号 ID。
      accountId: ""
      # 微信 iLink API 基础地址。
      baseUrl: https://ilinkai.weixin.qq.com
      # 微信媒体 CDN 基础地址。
      cdnBaseUrl: https://novac2c.cdn.weixin.qq.com/c2c
      # 微信 long-poll 地址；留空时使用默认接口。
      longPollUrl: ""
      # 微信允许访问的用户 ID 列表。
      allowedUsers: []
      # 微信是否允许所有用户访问。
      allowAllUsers: false
      # 未授权私聊用户的处理方式：pair 配对，ignore 忽略。
      unauthorizedDmBehavior: pair
      # 微信私聊策略：open、allowlist、disabled、pairing。
      dmPolicy: open
      # 微信群聊策略：open、allowlist、disabled。
      groupPolicy: disabled
      # 微信允许访问的群 ID 列表。
      groupAllowedUsers: []
      # 是否按多行强制拆分微信文本消息。
      splitMultilineMessages: false
      # 微信分片发送间隔，单位秒。
      sendChunkDelaySeconds: 0.35
      # 微信分片发送失败后的重试次数。
      sendChunkRetries: 2
      # 微信分片重试间隔，单位秒。
      sendChunkRetryDelaySeconds: 1.0
      # 微信工具进度模式；默认 off，避免向微信频繁发送工具调用中间态。
      toolProgress: off

    # QQBot 渠道配置。
    qqbot:
      # 是否启用 QQBot 渠道。
      enabled: false
      # QQBot App ID。
      appId: ""
      # QQBot Client Secret。
      clientSecret: ""
      # QQBot REST API 域名。
      apiDomain: https://api.sgroup.qq.com
      # QQBot websocket 地址；留空时从 /gateway 获取。
      websocketUrl: ""
      # 是否使用 QQBot Markdown 消息。
      markdownSupport: true
      # QQBot 允许访问的用户 ID 列表。
      allowedUsers: []
      # QQBot 是否允许所有用户访问。
      allowAllUsers: false
