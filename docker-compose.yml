services:
  solon-claw:
    # 默认使用 GitHub Packages 发布的单实例运行镜像。
    image: ghcr.io/chengliang4810/solon-claw:latest
    container_name: solon-claw
    restart: unless-stopped
    ports:
      # 左侧为宿主机端口，右侧为容器内 Solon HTTP 端口。
      - "8080:8080"
    environment:
      # 标记官方镜像运行环境，保持 Docker root guard 与诊断输出一致。
      SOLONCLAW_OFFICIAL_DOCKER_IMAGE: "1"
    volumes:
      # runtime 目录持久化保存配置、SQLite 数据、日志、缓存、技能和上下文文件。
      - ./runtime:/app/runtime
